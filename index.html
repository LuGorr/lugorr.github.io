<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Academic Webpage" />
    <meta name="author" content="senli1073" />
    <title id="title">Loading...</title>

    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,600;1,600&family=Mulish:wght@300;500;700&family=Kanit:wght@400&display=swap" rel="stylesheet" />

    <link type="text/css" href="static/css/styles.css" rel="stylesheet" />
    <link type="text/css" href="static/css/main.css" rel="stylesheet" />

    <style>
        /* Forza la visibilità del Game of Life */
        .top-section {
            position: relative;
            background-color: #0b0e14; /* Sfondo scuro profondo */
            height: 60vh; /* 60% dell'altezza schermo */
            min-height: 400px;
            display: flex;
            align-items: center;
            overflow: hidden;
        }
        #gameOfLifeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .top-section-content {
            position: relative;
            z-index: 2; /* Sopra al canvas */
            pointer-events: none; /* Il mouse interagisce col canvas, non col testo */
        }
        #avatar img {
            border: 5px solid white;
            border-radius: 50%;
            margin-top: -75px; /* Sovrappone parzialmente alla top-section */
            position: relative;
            z-index: 10;
            width: 150px;
        }
    </style>

    <script src="static/js/bootstrap.bundle.min.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script src="static/js/marked.min.js"></script>
    <script src="static/js/js-yaml.min.js"></script>
    
    <script>
        MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] } };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body id="page-top">
    <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
        <div class="container px-5">
            <a id="page-top-title" class="navbar-brand fw-bold" href="#page-top">Academic CV</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive">
                MENU <i class="bi-list"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                    <li class="nav-item"><a class="nav-link me-lg-3" href="#page-top">HOME</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="#projects">PROJECTS</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="#experience">EXPERIENCE</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="top-section">
        <canvas id="gameOfLifeCanvas"></canvas>
        <div class="top-section-content container px-5">
            <h2 id="top-section-bg-text" class="text-white display-3 lh-1 font-alt"></h2>
        </div>
    </section>

    <div class="container px-5">
        <div id="avatar"><img src="static/assets/img/photo.png" class="shadow"></div>
    </div>

    <section class="mt-5" id="home">
        <div class="container px-5">
            <h2 id="home-subtitle" class="fw-bold mb-4"></h2>
            <div class="main-body" id="home-md"></div>
        </div>
    </section>

    <section class="bg-light py-5" id="projects">
        <div class="container px-5">
            <h2 id="projects-subtitle" class="mb-4"><i class="bi bi-file-text-fill"></i> PROJECTS</h2>
            <div class="main-body" id="projects-md"></div>
        </div>
    </section>

    <section class="py-5" id="experience">
        <div class="container px-5">
            <h2 id="experience-subtitle" class="mb-4"><i class="bi bi-award-fill"></i> EXPERIENCE</h2>
            <div class="main-body" id="experience-md"></div>
        </div>
    </section>

    <footer class="bg-dark text-center py-5">
        <div class="container px-5">
            <div class="text-white-50 small">
                <div id="copyright-text" class="mb-2"></div>
                <a href="https://github.com/LuGorr">Github</a>
            </div>
        </div>
    </footer>

    <script src="static/js/scripts.js"></script>
</body>
</html>
